name: Daily Auto Commit

# Runs on a schedule + lets you trigger it manually from the Actions tab
on:
  schedule:
    # 5 runs per day, spread out (all times in UTC).
    # Cron format: minute hour day month day-of-week
    - cron: '0 3 * * *'   # ~08:30 AM IST
    - cron: '30 5 * * *'  # ~11:00 AM IST
    - cron: '0 8 * * *'   # ~01:30 PM IST
    - cron: '30 10 * * *' # ~04:00 PM IST
    - cron: '0 14 * * *'  # ~07:30 PM IST
  workflow_dispatch: {}

# Needed so the workflow is allowed to push back to the repo
permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append log entry
        run: |
          mkdir -p logs
          echo "- $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> logs/activity-log.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/activity-log.md
          git commit -m "chore: activity log update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
